name: Claude Code Review

# DISABLED (2026-06): migrated to native GitHub Copilot code review.
# Enable native automatic review in repo Settings -> Copilot -> Code review.
# This file is kept for reference only and is also disabled at the repo level
# via `gh workflow disable "Claude Code Review"`.
# To re-enable: restore the `pull_request` trigger below AND run
# `gh workflow enable "Claude Code Review"`.
on:
  workflow_dispatch:

jobs:
  claude-review:
    # Skip fork PRs: forks cannot be granted id-token: write permission,
    # so anthropics/claude-code-action@v1 cannot mint an OIDC token and
    # the job would always fail. Same-repo branch PRs continue to run.
    if: github.event.pull_request.head.repo.full_name == github.repository

    # Optional: Further filter by PR author
    # if: |
    #   github.event.pull_request.head.repo.full_name == github.repository &&
    #   (github.event.pull_request.user.login == 'external-contributor' ||
    #    github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

